<svg viewBox="0 0 1000 130" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="built quietly. shipped often.">
  <defs>
    <filter id="fGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#98989d" stop-opacity="0"/>
      <stop offset="12%" stop-color="#98989d" stop-opacity="1"/>
      <stop offset="88%" stop-color="#98989d" stop-opacity="1"/>
      <stop offset="100%" stop-color="#98989d" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .mono { font-family: 'SF Mono', ui-monospace, 'Cascadia Code', Consolas, Menlo, monospace; }
    @keyframes draw { 0%{stroke-dashoffset:1000} 55%{stroke-dashoffset:0} 100%{stroke-dashoffset:0} }
    .wire { stroke-dasharray: 1000; animation: draw 9s ease-in-out infinite; }
    .w2 { animation-delay: 0.6s; }
    @keyframes gatePop { 0%,8%{opacity:0} 14%,86%{opacity:1} 94%,100%{opacity:0} }
    .gate { animation: gatePop 9s ease-in-out infinite; }
    .g1{animation-delay:1.2s} .g2{animation-delay:2.2s} .g3{animation-delay:3.2s} .g4{animation-delay:1.7s} .g5{animation-delay:2.7s}
    @keyframes breathe { 0%,100%{opacity:0.4} 50%{opacity:0.85} }
    .cap { animation: breathe 6s ease-in-out infinite; }
  </style>

  <rect width="1000" height="130" fill="#0a0a0a"/>

  <!-- two qubit wires drawing themselves -->
  <g stroke="url(#fFade)" stroke-width="1" fill="none" opacity="0.5">
    <path d="M 80 42 H 920" pathLength="1000" class="wire"/>
    <path d="M 80 66 H 920" pathLength="1000" class="wire w2"/>
  </g>

  <!-- gates appear as the wires pass -->
  <g filter="url(#fGlow)">
    <rect x="264" y="34" width="16" height="16" rx="3" fill="none" stroke="#e5e5ea" stroke-opacity="0.7" stroke-width="1" class="gate g1"/>
    <circle cx="452" cy="42" r="4" fill="none" stroke="#e5e5ea" stroke-opacity="0.7" stroke-width="1" class="gate g2"/>
    <g class="gate g3">
      <line x1="452" y1="46" x2="452" y2="66" stroke="#e5e5ea" stroke-opacity="0.6" stroke-width="1"/>
      <circle cx="452" cy="66" r="3" fill="#e5e5ea" fill-opacity="0.7"/>
    </g>
    <rect x="614" y="58" width="16" height="16" rx="3" fill="none" stroke="#e5e5ea" stroke-opacity="0.7" stroke-width="1" class="gate g4"/>
    <path d="M 760 34 h 16 v 16 h -16 z M 762 47 q 6 -10 12 0 M 768 49 l 5 -8"
      fill="none" stroke="#e5e5ea" stroke-opacity="0.7" stroke-width="1" class="gate g5"/>
  </g>

  <text x="500" y="108" text-anchor="middle" class="mono cap" font-size="11" letter-spacing="3" fill="#8e8e93">built quietly · shipped often</text>
</svg>
