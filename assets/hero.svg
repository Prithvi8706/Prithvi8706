<svg viewBox="0 0 1000 400" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Prithvi — quantum ML, defence systems, research engineering">
  <defs>
    <radialGradient id="mist" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5f5f7" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#f5f5f7" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#f5f5f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mistSilver" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c7c7cc" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#c7c7cc" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c7c7cc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glassTopEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#c7c7cc" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c7c7cc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c7c7cc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="silverText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#e5e5ea"/>
      <stop offset="100%" stop-color="#98989d"/>
    </linearGradient>
    <linearGradient id="sheen" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="240" y2="0">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-300 0" to="1000 0" dur="5.5s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="blurHeavy" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <filter id="blurSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="silverGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feComponentTransfer in="b" result="dim"><feFuncA type="linear" slope="0.30"/></feComponentTransfer>
      <feMerge><feMergeNode in="dim"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="panelClip"><rect x="200" y="92" width="600" height="216" rx="24"/></clipPath>
    <clipPath id="typeClip">
      <rect x="256" y="252" width="490" height="24">
        <animate attributeName="width" dur="3s" begin="0.9s" fill="freeze" calcMode="discrete"
          values="0;35;60;85;110;135;160;185;210;235;260;285;310;335;360;385;410;435;460;490"
          keyTimes="0;0.05;0.1;0.15;0.2;0.25;0.3;0.36;0.42;0.48;0.54;0.6;0.66;0.72;0.78;0.84;0.9;0.94;0.97;1"/>
      </rect>
    </clipPath>
  </defs>

  <style>
    .sans { font-family: -apple-system, 'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .mono { font-family: 'SF Mono', ui-monospace, 'Cascadia Code', Consolas, Menlo, monospace; }
    @keyframes d1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(70px,24px)} }
    @keyframes d2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,-26px)} }
    @keyframes d3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,-20px)} }
    .m1{animation:d1 26s ease-in-out infinite}
    .m2{animation:d2 34s ease-in-out infinite}
    .m3{animation:d3 21s ease-in-out infinite}
    @keyframes breathe { 0%,100%{opacity:0.45} 50%{opacity:1} }
    .pulse{animation:breathe 4s ease-in-out infinite}
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    .cursor{animation:blink 1.05s steps(1) infinite}
    @keyframes sweep { 0%{transform:translateX(-260px)} 100%{transform:translateX(1000px)} }
    .sweep{animation:sweep 8s cubic-bezier(.4,0,.2,1) infinite}
    @keyframes scan { 0%{transform:translateY(-100px)} 100%{transform:translateY(420px)} }
    .scan{animation:scan 11s linear infinite}
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    .ring{transform-box:fill-box;transform-origin:center;animation:spin 100s linear infinite}
    .ringR{transform-box:fill-box;transform-origin:center;animation:spin 150s linear infinite reverse}
  </style>

  <rect width="1000" height="400" fill="#0a0a0a"/>

  <!-- faint orbit rings -->
  <g class="ring"><circle cx="500" cy="200" r="270" fill="none" stroke="#c7c7cc" stroke-opacity="0.07" stroke-width="1" stroke-dasharray="2 14"/></g>
  <g class="ringR"><circle cx="500" cy="200" r="212" fill="none" stroke="#f5f5f7" stroke-opacity="0.045" stroke-width="1" stroke-dasharray="1 10"/></g>

  <!-- mist field -->
  <g filter="url(#blurHeavy)">
    <g class="m1"><ellipse cx="220" cy="120" rx="220" ry="120" fill="url(#mist)"/></g>
    <g class="m2"><ellipse cx="800" cy="290" rx="250" ry="140" fill="url(#mist)"/></g>
    <g class="m3"><ellipse cx="500" cy="200" rx="220" ry="130" fill="url(#mistSilver)" class="pulse"/></g>
  </g>

  <!-- glass panel -->
  <rect x="200" y="92" width="600" height="216" rx="24"
    fill="#f5f5f7" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1"/>
  <rect x="228" y="92.5" width="544" height="1.4" fill="url(#glassTopEdge)"/>
  <g clip-path="url(#panelClip)">
    <g filter="url(#blurSoft)">
      <g class="m3"><ellipse cx="320" cy="300" rx="190" ry="80" fill="#f5f5f7" opacity="0.05"/></g>
      <g class="m1"><ellipse cx="720" cy="110" rx="160" ry="70" fill="#f5f5f7" opacity="0.045"/></g>
    </g>
    <g class="sweep"><rect x="0" y="70" width="210" height="260" fill="url(#sweepGrad)" transform="skewX(-18)"/></g>
  </g>

  <!-- content -->
  <g class="mono">
    <circle cx="260" cy="132" r="2.5" fill="#e5e5ea" filter="url(#silverGlow)" class="pulse"/>
    <text x="272" y="136" font-size="10.5" letter-spacing="3.5" fill="#98989d">QUANTUM · RESEARCH · ENGINEERING</text>
  </g>

  <text x="256" y="204" class="sans" font-size="58" font-weight="200" letter-spacing="15"
    fill="url(#silverText)" filter="url(#titleGlow)">PRITHVI</text>
  <text x="256" y="204" class="sans" font-size="58" font-weight="200" letter-spacing="15"
    fill="url(#sheen)" opacity="0.55">PRITHVI</text>

  <!-- suspended dust -->
  <g fill="#f5f5f7">
    <circle cx="120" cy="90"  r="1.2" opacity="0.05"><animate attributeName="opacity" values="0.02;0.09;0.02" dur="7s"  begin="0s"   repeatCount="indefinite"/><animate attributeName="cy" values="90;80;90"   dur="14s" repeatCount="indefinite"/></circle>
    <circle cx="870" cy="130" r="1"   opacity="0.05"><animate attributeName="opacity" values="0.03;0.08;0.03" dur="9s"  begin="1s"   repeatCount="indefinite"/><animate attributeName="cy" values="130;118;130" dur="17s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="300" r="1.4" opacity="0.04"><animate attributeName="opacity" values="0.02;0.07;0.02" dur="8s"  begin="2s"   repeatCount="indefinite"/><animate attributeName="cy" values="300;288;300" dur="16s" repeatCount="indefinite"/></circle>
    <circle cx="920" cy="310" r="1.1" opacity="0.05"><animate attributeName="opacity" values="0.03;0.09;0.03" dur="6.5s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="cy" values="310;322;310" dur="15s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="60"  r="1"   opacity="0.04"><animate attributeName="opacity" values="0.02;0.08;0.02" dur="7.5s" begin="3s"  repeatCount="indefinite"/><animate attributeName="cy" values="60;50;60"   dur="18s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="352" r="1.3" opacity="0.04"><animate attributeName="opacity" values="0.02;0.07;0.02" dur="8.5s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="cy" values="352;342;352" dur="15s" repeatCount="indefinite"/></circle>
    <circle cx="60"  cy="200" r="1"   opacity="0.05"><animate attributeName="opacity" values="0.03;0.08;0.03" dur="9.5s" begin="2.5s" repeatCount="indefinite"/><animate attributeName="cx" values="60;70;60"   dur="19s" repeatCount="indefinite"/></circle>
    <circle cx="945" cy="210" r="1.2" opacity="0.04"><animate attributeName="opacity" values="0.02;0.09;0.02" dur="7s"  begin="4s"   repeatCount="indefinite"/><animate attributeName="cx" values="945;935;945" dur="16s" repeatCount="indefinite"/></circle>
  </g>

  <rect x="256" y="222" width="488" height="1" fill="url(#hairline)"/>

  <g class="mono" font-size="12">
    <g clip-path="url(#typeClip)">
      <text x="256" y="268" fill="#8e8e93">&gt; fqcnn · entangled-equilibria · qmc-pricing · drdo-ew02</text>
    </g>
    <text x="700" y="268" fill="#e5e5ea" class="cursor">▍</text>
  </g>

  <!-- outer chrome, minimal -->
  <g class="mono" font-size="9.5" letter-spacing="2.5" fill="#5a5a5e">
    <text x="500" y="352" text-anchor="middle">QUANTUM ML  ·  DEFENCE SYSTEMS  ·  FULL-STACK</text>
  </g>

  <!-- scanline -->
  <g class="scan"><rect width="1000" height="80" fill="#f5f5f7" opacity="0.015"/></g>
</svg>
