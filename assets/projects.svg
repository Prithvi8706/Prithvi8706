<svg viewBox="0 0 1000 640" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Projects — FQCNN, Entangled Equilibria, QMC Pricing, DRDO EW-02">
  <defs>
    <radialGradient id="pMist" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5f5f7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f5f5f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="pBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="pGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="p1"><rect x="14"  y="20"  width="472" height="290" rx="20"/></clipPath>
    <clipPath id="p2"><rect x="514" y="20"  width="472" height="290" rx="20"/></clipPath>
    <clipPath id="p3"><rect x="14"  y="330" width="472" height="290" rx="20"/></clipPath>
    <clipPath id="p4"><rect x="514" y="330" width="472" height="290" rx="20"/></clipPath>
  </defs>

  <style>
    .sans { font-family: -apple-system, 'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .mono { font-family: 'SF Mono', ui-monospace, 'Cascadia Code', Consolas, Menlo, monospace; }
    @keyframes drift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(44px,16px)} }
    .dm  { animation: drift 25s ease-in-out infinite; }
    .dm2 { animation: drift 32s ease-in-out infinite reverse; }
    @keyframes trace { from{stroke-dashoffset:0} to{stroke-dashoffset:-1000} }
    .shimmer { stroke-dasharray: 130 870; animation: trace 7s linear infinite; }
    .s0{animation-delay:0s} .s1{animation-delay:-1.75s} .s2{animation-delay:-3.5s} .s3{animation-delay:-5.25s}
  </style>

  <rect width="1000" height="640" fill="#0a0a0a"/>

  <!-- ============ CARD TEMPLATE x4 ============ -->
  <!-- 1 · FQCNN -->
  <g>
    <g clip-path="url(#p1)" filter="url(#pBlur)">
      <g class="dm"><ellipse cx="400" cy="60" rx="170" ry="80" fill="url(#pMist)"/></g>
      <g class="dm2"><ellipse cx="80" cy="280" rx="150" ry="80" fill="url(#pMist)"/></g>
    </g>
    <rect x="14" y="20" width="472" height="290" rx="20" fill="#f5f5f7" fill-opacity="0.045"
      stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
    <rect x="36" y="20.5" width="428" height="1.2" fill="url(#pEdge)"/>
    <rect x="14" y="20" width="472" height="290" rx="20" fill="none" pathLength="1000"
      stroke="#e5e5ea" stroke-opacity="0.55" stroke-width="1.4" class="shimmer s0" filter="url(#pGlow)"/>

    <text x="46" y="86" class="sans" font-size="27" font-weight="300" letter-spacing="2" fill="#f5f5f7">FQCNN</text>
    <rect x="46" y="104" width="120" height="1" fill="#c7c7cc" opacity="0.25"/>
    <text x="46" y="140" class="sans" font-size="14.5" fill="#98989d">Fully quantum convolutional neural</text>
    <text x="46" y="162" class="sans" font-size="14.5" fill="#98989d">networks — circuits that learn.</text>
    <g class="mono" font-size="10.5">
      <rect x="46" y="248" width="104" height="24" rx="12" fill="#f5f5f7" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="98" y="264" text-anchor="middle" fill="#8e8e93">quantum ml</text>
    </g>
  </g>

  <!-- 2 · ENTANGLED EQUILIBRIA -->
  <g>
    <g clip-path="url(#p2)" filter="url(#pBlur)">
      <g class="dm2"><ellipse cx="600" cy="280" rx="160" ry="85" fill="url(#pMist)"/></g>
      <g class="dm"><ellipse cx="900" cy="60" rx="150" ry="80" fill="url(#pMist)"/></g>
    </g>
    <rect x="514" y="20" width="472" height="290" rx="20" fill="#f5f5f7" fill-opacity="0.045"
      stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
    <rect x="536" y="20.5" width="428" height="1.2" fill="url(#pEdge)"/>
    <rect x="514" y="20" width="472" height="290" rx="20" fill="none" pathLength="1000"
      stroke="#e5e5ea" stroke-opacity="0.55" stroke-width="1.4" class="shimmer s1" filter="url(#pGlow)"/>

    <text x="546" y="86" class="sans" font-size="27" font-weight="300" letter-spacing="1.5" fill="#f5f5f7">ENTANGLED EQUILIBRIA</text>
    <rect x="546" y="104" width="120" height="1" fill="#c7c7cc" opacity="0.25"/>
    <text x="546" y="140" class="sans" font-size="14.5" fill="#98989d">Where entanglement meets game theory —</text>
    <text x="546" y="162" class="sans" font-size="14.5" fill="#98989d">N-player quantum games on real noise.</text>
    <g class="mono" font-size="10.5">
      <rect x="546" y="248" width="72" height="24" rx="12" fill="#f5f5f7" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="582" y="264" text-anchor="middle" fill="#8e8e93">qiskit</text>
    </g>
  </g>

  <!-- 3 · QMC PRICING -->
  <g>
    <g clip-path="url(#p3)" filter="url(#pBlur)">
      <g class="dm"><ellipse cx="90" cy="370" rx="150" ry="80" fill="url(#pMist)"/></g>
      <g class="dm2"><ellipse cx="420" cy="590" rx="160" ry="85" fill="url(#pMist)"/></g>
    </g>
    <rect x="14" y="330" width="472" height="290" rx="20" fill="#f5f5f7" fill-opacity="0.045"
      stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
    <rect x="36" y="330.5" width="428" height="1.2" fill="url(#pEdge)"/>
    <rect x="14" y="330" width="472" height="290" rx="20" fill="none" pathLength="1000"
      stroke="#e5e5ea" stroke-opacity="0.55" stroke-width="1.4" class="shimmer s2" filter="url(#pGlow)"/>

    <text x="46" y="396" class="sans" font-size="27" font-weight="300" letter-spacing="2" fill="#f5f5f7">QMC PRICING</text>
    <rect x="46" y="414" width="120" height="1" fill="#c7c7cc" opacity="0.25"/>
    <text x="46" y="450" class="sans" font-size="14.5" fill="#98989d">Quantum Monte Carlo methods for derivative</text>
    <text x="46" y="472" class="sans" font-size="14.5" fill="#98989d">pricing — validated on IBM hardware.</text>
    <g class="mono" font-size="10.5">
      <rect x="46" y="558" width="112" height="24" rx="12" fill="#f5f5f7" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="102" y="574" text-anchor="middle" fill="#8e8e93">ibm quantum</text>
    </g>
  </g>

  <!-- 4 · DRDO EW-02 -->
  <g>
    <g clip-path="url(#p4)" filter="url(#pBlur)">
      <g class="dm2"><ellipse cx="920" cy="590" rx="150" ry="80" fill="url(#pMist)"/></g>
      <g class="dm"><ellipse cx="580" cy="380" rx="160" ry="85" fill="url(#pMist)"/></g>
    </g>
    <rect x="514" y="330" width="472" height="290" rx="20" fill="#f5f5f7" fill-opacity="0.045"
      stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
    <rect x="536" y="330.5" width="428" height="1.2" fill="url(#pEdge)"/>
    <rect x="514" y="330" width="472" height="290" rx="20" fill="none" pathLength="1000"
      stroke="#e5e5ea" stroke-opacity="0.55" stroke-width="1.4" class="shimmer s3" filter="url(#pGlow)"/>

    <text x="546" y="396" class="sans" font-size="27" font-weight="300" letter-spacing="2" fill="#f5f5f7">DRDO · EW-02</text>
    <rect x="546" y="414" width="120" height="1" fill="#c7c7cc" opacity="0.25"/>
    <text x="546" y="450" class="sans" font-size="14.5" fill="#98989d">Ionospheric modeling for HF geolocation —</text>
    <text x="546" y="472" class="sans" font-size="14.5" fill="#98989d">defence research, built solo.</text>
    <g class="mono" font-size="10.5">
      <rect x="546" y="558" width="112" height="24" rx="12" fill="#f5f5f7" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="602" y="574" text-anchor="middle" fill="#8e8e93">geolocation</text>
    </g>
  </g>
</svg>
