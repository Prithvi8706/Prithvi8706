name: telemetry

on:
  schedule:
    - cron: "0 3 * * *"    # daily, 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate telemetry panel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/build_telemetry.py

      - name: Commit if changed
        run: |
          git config user.name "telemetry-bot"
          git config user.email "actions@github.com"
          git add assets/telemetry.svg
          git diff --cached --quiet || git commit -m "telemetry sync"
          git push
